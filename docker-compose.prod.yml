services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NUXT_PUBLIC_API_BASE: ""
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "https://${APP_DOMAIN}"
      SERVER_NAME: "${APP_DOMAIN}, :80"
      DB_HOST: database
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/frankenphp/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${DB_DATABASE:-danse_macabre}"
      POSTGRES_USER: "${DB_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE:-danse_macabre}", "-U", "${DB_USERNAME:-postgres}"]
      retries: 3
      timeout: 5s
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
