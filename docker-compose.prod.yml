services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NUXT_PUBLIC_API_BASE: "${NUXT_PUBLIC_API_BASE:-https://${APP_DOMAIN}}"
    environment:
      APP_KEY: "${APP_KEY}"
      APP_URL: "https://${APP_DOMAIN}"
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-danse_macabre}"
      DB_USERNAME: "${DB_USERNAME:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD}"
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/frankenphp/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${DB_DATABASE:-danse_macabre}"
      POSTGRES_USER: "${DB_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE:-danse_macabre}", "-U", "${DB_USERNAME:-postgres}"]
      retries: 3
      timeout: 5s
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
